services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kondo
      POSTGRES_USER: kondo
      POSTGRES_PASSWORD: kondo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kondo -d kondo"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kondo:kondo@db:5432/kondo
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
      JWT_SECRET_KEY: change-me-in-production
      AI_ENABLE_MOCK_FALLBACK: "true"
      # Optional — set your key to enable real AI responses
      # ANTHROPIC_API_KEY: your-key-here
      # OPENAI_API_KEY: your-key-here
    volumes:
      - ../storage:/app/storage
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
